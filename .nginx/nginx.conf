server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Límites ─────────────────────────────────────────────────────────────
    client_max_body_size 500M;   # Necesario para subida de DICOMs
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/wasm image/svg+xml;

    # ── Seguridad (headers básicos) ───────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header Referrer-Policy         strict-origin-when-cross-origin always;

    # ── Assets estáticos (cacheable) ──────────────────────────────────────────
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|woff2?|eot|ttf|svg|mp4|webm|wasm)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # ── API Backend (Node.js) ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 100M;
    }

    # ── Orthanc DICOM (imágenes radiológicas) ─────────────────────────────────
    location /orthanc/ {
        proxy_pass         http://orthanc:8042/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Necesario para WebSocket de OHIF
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        client_max_body_size 500M;
        proxy_read_timeout   600s;
    }

    # ── SPA React (fallback a index.html para React Router) ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
